services:
  dashboard:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      # NOTE: If DB_PASSWORD contains special characters (e.g. @, #, %, /),
      # you must percent-encode them in the connection string. Consider using
      # only alphanumeric passwords to avoid issues.
      DATABASE_URL: postgres://raava:${DB_PASSWORD:?DB_PASSWORD is required}@db:5432/raava_dashboard
      HOST: "0.0.0.0"
      PORT: "3100"
      SERVE_UI: "true"
      PAPERCLIP_DEPLOYMENT_MODE: ${DEPLOYMENT_MODE:-authenticated}
      PAPERCLIP_DEPLOYMENT_EXPOSURE: ${DEPLOYMENT_EXPOSURE:-private}
      PAPERCLIP_PUBLIC_URL: ${PUBLIC_URL:-https://demo.raava.io}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}
      FLEETOS_API_URL: ${FLEETOS_API_URL:-http://host.docker.internal:8400}
    volumes:
      - paperclip-data:/paperclip
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3100/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: raava
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: raava_dashboard
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raava -d raava_dashboard"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot-webroot:/var/www/certbot:ro
    depends_on:
      dashboard:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3

  certbot:
    image: certbot/certbot
    volumes:
      - ./nginx/ssl:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    # NOTE: After certbot renews certs, nginx must reload to pick them up.
    # Because certbot and nginx run in separate containers, certbot cannot
    # directly signal nginx. The --deploy-hook below copies renewed certs to
    # the flat /etc/letsencrypt/live/ directory that nginx reads from. You
    # must still restart or reload nginx after renewal, e.g. via a cron job:
    #   docker compose -f docker-compose.production.yml exec nginx nginx -s reload
    entrypoint: >-
      /bin/sh -c 'trap exit TERM; while :; do
        certbot renew --deploy-hook "cp -Lf /etc/letsencrypt/live/*/fullchain.pem /etc/letsencrypt/live/fullchain.pem && cp -Lf /etc/letsencrypt/live/*/privkey.pem /etc/letsencrypt/live/privkey.pem";
        sleep 12h & wait $${!};
      done'

volumes:
  pgdata:
  paperclip-data:
  certbot-webroot:
